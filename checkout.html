<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kabini Global | Checkout</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

/* ================= ROOT ================= */
:root{
--green:#0f5f2f;
--gold:#d4af37;
--bg:#f7f5f0;
--card:#fff;
--radius:16px;
--shadow:0 10px 30px rgba(0,0,0,0.08);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:var(--bg);
}

/* ================= NAV ================= */
nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
background:rgba(15,95,47,0.95);
color:#fff;
z-index:1000;
}

nav a{
color:#fff;
text-decoration:none;
font-weight:600;
margin-left:15px;
}

/* ================= LAYOUT ================= */
.container{
max-width:1100px;
margin:100px auto;
padding:15px;
}

.grid{
display:grid;
grid-template-columns:2fr 1fr;
gap:25px;
}

@media(max-width:900px){
.grid{
grid-template-columns:1fr;
}
}

/* ================= FORM ================= */
.form-box{
background:var(--card);
padding:20px;
border-radius:var(--radius);
box-shadow:var(--shadow);
}

.form-box h2{
margin-bottom:15px;
}

.input{
margin-bottom:12px;
}

.input input,
.input textarea,
select{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
}

textarea{
height:100px;
resize:none;
}

/* ================= SUMMARY ================= */
.summary{
background:rgba(255,255,255,0.7);
backdrop-filter:blur(12px);
padding:20px;
border-radius:var(--radius);
box-shadow:var(--shadow);
}

.item{
display:flex;
justify-content:space-between;
margin:8px 0;
font-size:14px;
}

.total{
margin-top:15px;
font-size:18px;
font-weight:700;
display:flex;
justify-content:space-between;
}

/* ================= BUTTON ================= */
.btn{
width:100%;
padding:14px;
margin-top:20px;
border:none;
border-radius:10px;
background:var(--gold);
font-weight:700;
cursor:pointer;
}

.btn:hover{
opacity:0.9;
}

/* ================= EMPTY ================= */
.empty{
text-align:center;
padding:40px;
}

</style>
</head>

<body>

<!-- NAV -->
<nav>
<div><strong>Kabini LTD</strong></div>
<div>
<a href="index.html">Home</a>
<a href="product.html">Products</a>
<a href="cart.html">Cart</a>
<a href="order.html">Orders</a>
</div>
</nav>

<!-- CONTENT -->
<div class="container">

<h2>Checkout</h2>

<div class="grid">

<!-- FORM -->
<div class="form-box">

<h2>Billing Details</h2>

<div class="input">
<input id="name" placeholder="Full Name">
</div>

<div class="input">
<input id="email" placeholder="Email Address">
</div>

<div class="input">
<input id="phone" placeholder="Phone Number">
</div>

<div class="input">
<textarea id="address" placeholder="Delivery Address"></textarea>
</div>

<h2>Shipping</h2>

<div class="input">
<select id="location">
<option value="Abuja">Abuja</option>
<option value="Lagos">Lagos</option>
<option value="Kano">Kano</option>
<option value="Port Harcourt">Port Harcourt</option>
</select>
</div>

<div class="input">
<select id="shipping">
<option value="standard">Standard</option>
<option value="express">Express</option>
</select>
</div>

<h2>Payment</h2>

<div class="input">
<select id="payment">
<option value="cod">Pay on Delivery</option>
<option value="card">Card</option>
<option value="transfer">Bank Transfer</option>
</select>
</div>

<button class="btn" onclick="placeOrder()">Place Order</button>

</div>

<!-- SUMMARY -->
<div class="summary">

<h3>Order Summary</h3>

<div id="items"></div>

<div class="total">
<span>Total</span>
<span id="total">₦0</span>
</div>

</div>

</div>
</div>

<script>

/* ================= CART ================= */
let cart = JSON.parse(localStorage.getItem("cart")) || [];

const itemsBox = document.getElementById("items");
const totalBox = document.getElementById("total");

/* ================= RENDER ================= */
function render() {

itemsBox.innerHTML = "";

let subtotal = 0;

if (!cart || cart.length === 0) {
itemsBox.innerHTML = "<p class='empty'>Cart is empty</p>";
totalBox.innerText = "₦0";
return;
}

cart.forEach(item => {

let price = Number(item.price) || 0;
let qty = Number(item.qty) || 1;

let total = price * qty;
subtotal += total;

itemsBox.innerHTML += `
<div class="item">
<span>${item.name} x${qty}</span>
<span>₦${total.toLocaleString()}</span>
</div>
`;

});

let shipping = 2000;
let total = subtotal + shipping;

totalBox.innerText = "₦" + total.toLocaleString();

}

render();

/* ================= WHATSAPP ================= */
function sendToWhatsApp(orderData) {

let message = `🛒 *New Order from Kabini Global*\n\n`;

message += `👤 *Customer Details*\n`;
message += `Name: ${orderData.customer.name}\n`;
message += `Email: ${orderData.customer.email}\n`;
message += `Phone: ${orderData.customer.phone}\n`;
message += `Address: ${orderData.customer.address}\n\n`;

message += `📦 *Order Items*\n`;

let subtotal = 0;

orderData.items.forEach(item => {

let price = Number(item.price) || 0;
let qty = Number(item.qty) || 1;
let total = price * qty;

subtotal += total;

message += `- ${item.name} x${qty} = ₦${total.toLocaleString()}\n`;

});

let shipping = 2000;
let total = subtotal + shipping;

message += `\n🚚 Shipping: ₦${shipping.toLocaleString()}`;
message += `\n💰 *Total: ₦${total.toLocaleString()}*`;
message += `\n\n📅 Order Time: ${new Date().toLocaleString()}`;

let phoneNumber = "2348107808968"; // <-- PUT YOUR NUMBER

let url = `https://wa.me/${phoneNumber}?text=${encodeURIComponent(message)}`;

window.open(url, "_blank");

}

/* ================= ORDER ================= */
function placeOrder() {

if (!cart || cart.length === 0) {
alert("Cart is empty");
return;
}

let name = document.getElementById("name").value.trim();
let email = document.getElementById("email").value.trim();
let phone = document.getElementById("phone").value.trim();
let address = document.getElementById("address").value.trim();

if (!name || !email || !phone || !address) {
alert("Fill all fields");
return;
}

let order = {
id: Date.now(),
customer: { name, email, phone, address },
items: cart,
date: new Date().toLocaleString(),
status: "Processing"
};

let orders = JSON.parse(localStorage.getItem("orders")) || [];
orders.push(order);

localStorage.setItem("orders", JSON.stringify(orders));
localStorage.removeItem("cart");

/* 👉 SEND TO WHATSAPP */
sendToWhatsApp(order);

alert("Redirecting to WhatsApp...");

}

</script>

</body>
</html>
