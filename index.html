<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexaCore Technologies | Ultra v2</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

/* ================= ROOT ================= */
:root{
--bg:#050816;
--blue:#4fd1ff;
--purple:#7c5cff;
--green:#00ffa6;
--muted:#9aa4c7;
--glass:rgba(255,255,255,0.06);
--border:rgba(255,255,255,0.12);
}

/* ================= RESET ================= */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:var(--bg);
color:#fff;
overflow-x:hidden;
}

/* ================= LOADING SCREEN ================= */
#loader{
position:fixed;
width:100%;
height:100vh;
background:#050816;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:99999;
}

.loader-text{
font-size:22px;
font-weight:700;
background:linear-gradient(90deg,var(--blue),var(--purple));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{opacity:0.4}
50%{opacity:1}
100%{opacity:0.4}
}

/* ================= PARTICLES BACKGROUND ================= */
#particles{
position:fixed;
width:100%;
height:100%;
z-index:-1;
}

/* ================= NAV ================= */
nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 20px;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(20px);
z-index:9999;
border-bottom:1px solid var(--border);
}

.logo{
display:flex;
align-items:center;
gap:10px;
font-weight:800;
}

.logo img{
width:40px;
height:40px;
border-radius:10px;
}

/* NAV LINKS */
.nav-links{
display:flex;
gap:18px;
list-style:none;
}

.nav-links a{
color:var(--muted);
text-decoration:none;
font-weight:600;
transition:0.3s;
}

.nav-links a:hover{
color:var(--blue);
}

/* ================= HAMBURGER ================= */
.hamburger{
display:none;
flex-direction:column;
cursor:pointer;
}

.hamburger span{
width:28px;
height:3px;
background:#fff;
margin:4px;
border-radius:5px;
transition:0.3s;
}

.hamburger.active span:nth-child(1){
transform:rotate(45deg) translate(6px,6px);
}

.hamburger.active span:nth-child(2){
opacity:0;
}

.hamburger.active span:nth-child(3){
transform:rotate(-45deg) translate(6px,-6px);
}

/* MOBILE */
@media(max-width:900px){
.hamburger{display:flex;}
.nav-links{
position:fixed;
top:0;
right:-100%;
height:100vh;
width:280px;
flex-direction:column;
padding:80px 20px;
background:rgba(10,10,20,0.95);
transition:0.4s;
}
.nav-links.active{right:0;}
}

/* ================= HERO ================= */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:
linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.9));
}

.hero h1{
font-size:3.5rem;
background:linear-gradient(90deg,var(--blue),var(--purple));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hero p{
color:var(--muted);
margin-top:10px;
}

/* BUTTON */
.btn{
margin-top:20px;
padding:14px 28px;
border-radius:999px;
background:linear-gradient(90deg,var(--blue),var(--purple));
color:#000;
font-weight:800;
text-decoration:none;
transition:0.3s;
}

.btn:hover{
transform:scale(1.05);
}

/* ================= BADGES ================= */
.badges{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:20px;
justify-content:center;
}

.badge{
padding:8px 14px;
border-radius:50px;
background:linear-gradient(90deg,var(--blue),var(--purple),var(--green));
font-size:12px;
font-weight:700;
box-shadow:0 0 15px rgba(79,209,255,0.4);
}

/* ================= 3D CARDS ================= */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:40px;
}

.product{
background:#111;
border-radius:14px;
overflow:hidden;
transition:0.4s;
transform-style:preserve-3d;
}

.product:hover{
transform:rotateY(10deg) rotateX(5deg) scale(1.05);
box-shadow:0 20px 40px rgba(0,0,0,0.5);
}

.product img{
width:100%;
height:180px;
object-fit:cover;
}

/* ================= CERTIFICATES ================= */
.certificates{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:40px;
}

.certificate{
background:var(--glass);
border:1px solid var(--border);
padding:20px;
border-radius:14px;
transition:0.3s;
}

.certificate:hover{
box-shadow:0 0 25px rgba(124,92,255,0.4);
transform:translateY(-8px);
}

/* ================= FOOTER ================= */
footer{
padding:40px;
text-align:center;
color:var(--muted);
border-top:1px solid var(--border);
}

</style>
</head>

<body>

<!-- ================= LOADER ================= -->
<div id="loader">
<div class="loader-text">NexaCore Loading...</div>
</div>

<!-- ================= PARTICLES ================= -->
<canvas id="particles"></canvas>

<!-- ================= NAV ================= -->
<nav>

<div class="logo">
<img src="https://images.unsplash.com/photo-1605902711622-cfb43c4437b0">
<span>NEXACORE</span>
</div>

<ul class="nav-links">
<li><a href="#">Home</a></li>
<li><a href="#products">Products</a></li>
<li><a href="#cert">Certificates</a></li>
<li><a href="#contact">Contact</a></li>
</ul>

<div class="hamburger" onclick="toggleMenu()">
<span></span><span></span><span></span>
</div>

</nav>

<!-- ================= HERO ================= -->
<section class="hero">

<h1>FUTURE IS NOW</h1>
<p>AI • Energy • Tech • Agriculture</p>

<a class="btn" href="#products">Explore</a>

<div class="badges">
<div class="badge">AI Powered</div>
<div class="badge">Global Export</div>
<div class="badge">Secure System</div>
<div class="badge">Certified Tech</div>
</div>

</section>

<!-- ================= PRODUCTS ================= -->
<section id="products" class="products">

<div class="product"><img src="https://images.unsplash.com/photo-1518770660439-4636190af475"></div>
<div class="product"><img src="https://images.unsplash.com/photo-1581092160607-ee22621dd758"></div>
<div class="product"><img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8"></div>

</section>

<!-- ================= CERTIFICATES ================= -->
<section id="cert" class="certificates">

<div class="certificate"><h3>ISO 9001</h3></div>
<div class="certificate"><h3>AI Security Certified</h3></div>
<div class="certificate"><h3>Global Trade License</h3></div>

</section>

<!-- ================= FOOTER ================= -->
<footer id="contact">
© 2026 NexaCore Ultra System
</footer>

<script>

/* LOADER */
window.onload=function(){
document.getElementById("loader").style.display="none";
}

/* MENU */
function toggleMenu(){
document.querySelector(".nav-links").classList.toggle("active");
}

/* PARTICLES */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particlesArray=[];

for(let i=0;i<80;i++){
particlesArray.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*3
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="#4fd1ff";

particlesArray.forEach(p=>{
ctx.beginPath();
ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
ctx.fill();
p.y+=0.5;
if(p.y>canvas.height)p.y=0;
});

requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
