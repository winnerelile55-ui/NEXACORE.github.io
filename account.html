<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kabini LTD - Account</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root {
    --deep-green:#0f5f2f;
    --earth-brown:#5c4033;
    --gold:#d4af37;
    --white:#fff;
    --bg:#fefcf8;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{background:var(--bg);}

/* NAV (SAME AS INDEX) */
nav{
    position:fixed;
    width:100%;
    top:0;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 30px;
    background:rgba(15,95,47,0.9);
    backdrop-filter:blur(10px);
    z-index:1000;
}

.logo-container{
    display:flex;
    align-items:center;
    gap:10px;
    color:#fff;
}
.logo-container img{height:45px;}

nav ul{display:flex;gap:25px;list-style:none;}
nav a{color:#fff;text-decoration:none;font-weight:600;}

.menu-toggle{display:none;flex-direction:column;cursor:pointer;}
.menu-toggle div{width:25px;height:3px;background:#fff;margin:4px;}

.overlay{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.4);
    opacity:0;visibility:hidden;
    transition:0.3s;
}
.overlay.active{opacity:1;visibility:visible;}

@media(max-width:768px){
    nav ul{
        position:fixed;
        right:-100%;
        top:65px;
        flex-direction:column;
        width:260px;
        height:100%;
        padding:25px;
        background:rgba(255,255,255,0.15);
        backdrop-filter:blur(20px);
        transition:0.5s;
        z-index:999;
    }
    nav ul.active{right:0;}
    .menu-toggle{display:flex;}
}

/* ACCOUNT */
.container{
    padding:120px 30px 50px;
    max-width:1000px;
    margin:auto;
}

.account-box{
    background:#fff;
    border-radius:15px;
    padding:30px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.account-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.account-header h2{color:var(--deep-green);}

.btn{
    padding:10px 20px;
    border:none;
    border-radius:8px;
    background:var(--deep-green);
    color:#fff;
    cursor:pointer;
}
.btn:hover{background:var(--earth-brown);}

.info{
    margin-bottom:20px;
}
.info p{margin:5px 0;}

.orders{
    margin-top:20px;
}

.order-item{
    background:#f9f9f9;
    padding:15px;
    border-radius:10px;
    margin-bottom:10px;
}

.empty{text-align:center;color:#999;margin-top:20px;}

footer{
    background:var(--deep-green);
    color:#fff;
    text-align:center;
    padding:30px;
}
</style>
</head>

<body>

<div class="overlay"></div>

<nav>
<div class="logo-container">
<img src="https://raw.githubusercontent.com/winnerelile55-ui/KABINI-GLOBAL-FARMS/refs/heads/main/IMG-20260323-WA0001.jpg">
<span>KABINI  LTD</span>
</div>

<ul>
<li><a href="index.html">Home</a></li>
<li><a href="order.html">Orders</a></li>
<li><a href="product.html">Products</a></li>
<li><a href="cart.html">Cart</a></li>
<li><a href="checkout.html">Checkout</a></li>
<li><a href="receipt.html">Receipt</a></li>
<li><a href="login.html">Login</a></li>
</ul>

<div class="menu-toggle"><div></div><div></div><div></div></div>
</nav>

<div class="container">
<div class="account-box">

<div class="account-header">
<h2>My Account</h2>
<button class="btn" onclick="logout()">Logout</button>
</div>

<div class="info" id="userInfo"></div>

<div class="orders">
<h3>Order History</h3>
<div id="orderList"></div>
</div>

</div>
</div>

<footer>
<p>© 2026 Kabini LTD</p>
</footer>

<script>
const toggle=document.querySelector('.menu-toggle');
const nav=document.querySelector('nav ul');
const overlay=document.querySelector('.overlay');

toggle.addEventListener('click',()=>{
    nav.classList.toggle('active');
    overlay.classList.toggle('active');
});

overlay.addEventListener('click',()=>{
    nav.classList.remove('active');
    overlay.classList.remove('active');
});

// LOAD USER
const user = JSON.parse(localStorage.getItem('kabiniUser'));
const userInfo = document.getElementById('userInfo');

if(user){
    userInfo.innerHTML = `
        <p><strong>Name:</strong> ${user.name}</p>
        <p><strong>Email:</strong> ${user.email}</p>
    `;
}else{
    window.location.href = 'login.html';
}

// LOAD ORDERS
const orders = JSON.parse(localStorage.getItem('kabiniOrders')) || [];
const orderList = document.getElementById('orderList');

if(orders.length === 0){
    orderList.innerHTML = '<p class="empty">No orders yet</p>';
}else{
    orders.forEach(order => {
        const div = document.createElement('div');
        div.className = 'order-item';
        div.innerHTML = `
            <p><strong>Order ID:</strong> ${order.id}</p>
            <p><strong>Total:</strong> ₦${order.total}</p>
            <p><strong>Date:</strong> ${order.date}</p>
        `;
        orderList.appendChild(div);
    });
}

function logout(){
    localStorage.removeItem('kabiniUser');
    alert('Logged out');
    window.location.href='login.html';
}
</script>

</body>
<script src="app.js"></script>
</html>
