<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kabini Global | Cart</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* ================= ROOT ================= */
:root{
--green:#0f5f2f;
--brown:#5c4033;
--gold:#d4af37;
--bg:#f7f5f0;
--card:#fff;
--radius:16px;
--shadow:0 10px 30px rgba(0,0,0,0.08);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:var(--bg);
}

/* ================= NAV ================= */
nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
background:rgba(15,95,47,0.95);
backdrop-filter:blur(15px);
color:#fff;
z-index:1000;
}

nav img{
height:40px;
}

/* Desktop menu */
.nav-links{
display:flex;
gap:20px;
list-style:none;
}

.nav-links a{
color:#fff;
text-decoration:none;
font-weight:600;
}

/* ================= HAMBURGER ================= */
.hamburger{
display:none;
flex-direction:column;
gap:5px;
cursor:pointer;
}

.hamburger span{
width:25px;
height:3px;
background:#fff;
border-radius:5px;
transition:0.3s;
}

/* Mobile menu */
.mobile-menu{
position:fixed;
top:0;
right:-100%;
width:75%;
height:100vh;
background:#fff;
box-shadow:-10px 0 30px rgba(0,0,0,0.2);
padding:30px;
display:flex;
flex-direction:column;
gap:20px;
transition:0.4s;
z-index:2000;
}

.mobile-menu a{
color:var(--green);
text-decoration:none;
font-weight:600;
font-size:18px;
}

/* ACTIVE MENU */
.mobile-menu.active{
right:0;
}

/* Overlay */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
opacity:0;
visibility:hidden;
transition:0.3s;
z-index:1500;
}

.overlay.active{
opacity:1;
visibility:visible;
}

/* Responsive */
@media(max-width:768px){
.nav-links{
display:none;
}

.hamburger{
display:flex;
}
}

/* ================= LAYOUT ================= */
.container{
margin-top:100px;
padding:15px;
max-width:1200px;
margin-inline:auto;
}

.cart-layout{
display:grid;
grid-template-columns:2fr 1fr;
gap:25px;
}

@media(max-width:900px){
.cart-layout{
grid-template-columns:1fr;
}
}

/* ================= CART ITEMS ================= */
.cart-box{
background:var(--card);
padding:15px;
border-radius:var(--radius);
box-shadow:var(--shadow);
}

.cart-item{
display:flex;
gap:15px;
padding:15px 0;
border-bottom:1px solid #eee;
align-items:center;
}

.cart-item img{
width:90px;
height:90px;
object-fit:cover;
border-radius:10px;
}

.item-details{
flex:1;
}

.price{
color:var(--green);
font-weight:700;
}

.controls{
display:flex;
align-items:center;
gap:10px;
margin-top:8px;
}

.controls button{
padding:6px 10px;
border:none;
background:var(--green);
color:#fff;
cursor:pointer;
border-radius:6px;
}

.remove{
background:red;
}

/* ================= SUMMARY ================= */
.summary{
background:rgba(255,255,255,0.7);
backdrop-filter:blur(12px);
padding:20px;
border-radius:var(--radius);
box-shadow:var(--shadow);
}

.summary h3{
margin-bottom:15px;
}

.summary p{
display:flex;
justify-content:space-between;
margin:10px 0;
}

.checkout-btn{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:var(--gold);
font-weight:700;
cursor:pointer;
margin-top:15px;
}

/* ================= TOAST ================= */
.toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:var(--green);
color:#fff;
padding:12px 16px;
border-radius:10px;
opacity:0;
transition:0.3s;
}

.toast.show{
opacity:1;
}

</style>
</head>

<body>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<!-- MOBILE MENU -->
<div class="mobile-menu" id="mobileMenu">
<a href="index.html">Home</a>
<a href="product.html">Products</a>
<a href="cart.html">Cart</a>
<a href="checkout.html">Checkout</a>
<a href="order.html">Orders</a>

</div>

<!-- NAV -->
<nav>

<img src="https://raw.githubusercontent.com/winnerelile55-ui/KABINI-GLOBAL-FARMS/refs/heads/main/IMG-20260323-WA0001.jpg">

<ul class="nav-links">
<li><a href="index.html">Home</a></li>
<li><a href="product.html">Products</a></li>
<li><a href="cart.html">Cart</a></li>
<li><a href="checkout.html">Checkout</a></li>
<li><a href="order.html">Orders</a></li>
</ul>

<div class="hamburger" onclick="toggleMenu()">
<span></span>
<span></span>
<span></span>
</div>

</nav>

<!-- CONTENT -->
<div class="container">

<h2 style="margin-bottom:15px;">🛒 Your Cart</h2>

<div class="cart-layout">

<div class="cart-box" id="cartItems"></div>

<div class="summary">

<h3>Order Summary</h3>

<p>Subtotal <span id="subtotal">₦0</span></p>
<p>Shipping <span>₦2000</span></p>
<p><strong>Total <span id="total">₦0</span></strong></p>

<button class="checkout-btn" onclick="checkout()">Proceed to Checkout</button>

</div>

</div>

</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>

/* ================= MENU ================= */

function toggleMenu(){
document.getElementById("mobileMenu").classList.toggle("active")
document.getElementById("overlay").classList.toggle("active")
}

/* ================= CART ================= */

let cart = JSON.parse(localStorage.getItem("cart")) || []

cart = cart.map(item => ({
...item,
price: Number(item.price) || 0,
qty: Number(item.qty) || 1
}))

const cartBox = document.getElementById("cartItems")

function renderCart(){

cartBox.innerHTML = ""

if(cart.length === 0){
cartBox.innerHTML = `<h3 style="text-align:center;">Your cart is empty</h3>`
updateTotals()
return
}

cart.forEach(item => {

cartBox.innerHTML += `
<div class="cart-item">

<img src="${item.img}">

<div class="item-details">

<h4>${item.name}</h4>

<p class="price">₦${item.price}</p>

<div class="controls">

<button onclick="decrease(${item.id})">-</button>
<span>${item.qty}</span>
<button onclick="increase(${item.id})">+</button>
<button class="remove" onclick="removeItem(${item.id})">Remove</button>

</div>

</div>

</div>
`

})

updateTotals()

}

/* ================= ACTIONS ================= */

function increase(id){
cart = cart.map(i => i.id === id ? {...i, qty:i.qty+1} : i)
save()
toast("Updated")
}

function decrease(id){
cart = cart.map(i => i.id === id ? {...i, qty:Math.max(1,i.qty-1)} : i)
save()
toast("Updated")
}

function removeItem(id){
cart = cart.filter(i => i.id !== id)
save()
toast("Removed")
}

function save(){
localStorage.setItem("cart", JSON.stringify(cart))
renderCart()
}

/* ================= TOTAL ================= */

function updateTotals(){

let subtotal = 0

cart.forEach(item => {
subtotal += item.price * item.qty
})

document.getElementById("subtotal").innerText = "₦" + subtotal

let total = subtotal + 2000

document.getElementById("total").innerText = "₦" + total

}

/* ================= CHECKOUT ================= */

function checkout(){

if(cart.length === 0){
toast("Cart is empty")
return
}

localStorage.setItem("order", JSON.stringify(cart))
window.location.href = "checkout.html"

}

/* ================= TOAST ================= */

function toast(msg){
let t = document.getElementById("toast")
t.innerText = msg
t.classList.add("show")
setTimeout(()=>t.classList.remove("show"),2000)
}

/* INIT */
renderCart()

</script>

</body>
<script src="app.js"></script>
</html>
