<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kabini Admin Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root {
    --deep-green:#0f5f2f;
    --earth-brown:#5c4033;
    --gold:#d4af37;
    --white:#fff;
    --bg:#fefcf8;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{background:var(--bg);}

nav{
    position:fixed;
    width:100%;
    top:0;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 30px;
    background:rgba(15,95,47,0.9);
    backdrop-filter:blur(10px);
    z-index:1000;
}

.logo-container{display:flex;align-items:center;gap:10px;color:#fff;font-weight:600;}
.logo-container img{height:45px;}

nav ul{display:flex;gap:25px;list-style:none;}
nav a{color:#fff;text-decoration:none;font-weight:600;}

.menu-toggle{display:none;flex-direction:column;cursor:pointer;}
.menu-toggle div{width:25px;height:3px;background:#fff;margin:4px;}

.overlay{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.4);
    opacity:0;
    pointer-events:none;
    transition:0.3s;
}
.overlay.active{opacity:1;pointer-events:auto;}

@media(max-width:768px){
    nav ul{
        position:fixed;
        right:-100%;
        top:65px;
        flex-direction:column;
        width:260px;
        height:calc(100% - 65px);
        padding:25px;
        background:rgba(255,255,255,0.15);
        backdrop-filter:blur(20px);
        transition:0.5s;
    }
    nav ul.active{right:0;}
    .menu-toggle{display:flex;}
}

.container{
    margin-top:100px;
    padding:40px;
}

h1{color:var(--deep-green);margin-bottom:20px;}

.dashboard{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:#fff;
    padding:20px;
    border-radius:12px;
    box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

.orders{
    margin-top:30px;
}

.order-item{
    background:#fff;
    padding:15px;
    margin-bottom:10px;
    border-radius:10px;
}

button{
    padding:10px 15px;
    border:none;
    background:var(--deep-green);
    color:#fff;
    border-radius:8px;
    cursor:pointer;
}

button:hover{background:var(--earth-brown);}

</style>
</head>

<body>

<nav>
<div class="logo-container">
<img src="https://raw.githubusercontent.com/winnerelile55-ui/KABINI-GLOBAL-FARMS/refs/heads/main/IMG-20260323-WA0001.jpg">
<span>KABINI ADMIN</span>
</div>

<ul>
<li><a href="index.html">Home</a></li>
<li><a href="product.html">Products</a></li>
<li><a href="order.html">Orders</a></li>
<li><a href="account.html">Account</a></li>
</ul>

<div class="menu-toggle"><div></div><div></div><div></div></div>
</nav>

<div class="overlay"></div>

<div class="container">
<h1>Admin Dashboard</h1>

<div class="dashboard">
<div class="card"><h3>Total Orders</h3><p id="totalOrders">0</p></div>
<div class="card"><h3>Total Revenue</h3><p id="revenue">₦0</p></div>
<div class="card"><h3>Users</h3><p id="users">0</p></div>
</div>

<div class="orders">
<h2>All Orders</h2>
<div id="ordersList"></div>
</div>

<button onclick="clearOrders()">Clear All Orders</button>
</div>

<script>
const toggle=document.querySelector('.menu-toggle');
const nav=document.querySelector('nav ul');
const overlay=document.querySelector('.overlay');

toggle.addEventListener('click',()=>{
    nav.classList.toggle('active');
    overlay.classList.toggle('active');
});

overlay.addEventListener('click',()=>{
    nav.classList.remove('active');
    overlay.classList.remove('active');
});

let orders=JSON.parse(localStorage.getItem('orders'))||[];
let users=JSON.parse(localStorage.getItem('users'))||[];

const list=document.getElementById('ordersList');
const totalOrders=document.getElementById('totalOrders');
const revenue=document.getElementById('revenue');
const usersCount=document.getElementById('users');

function load(){
    list.innerHTML='';
    let total=0;

    orders.forEach(o=>{
        total+=o.total;
        const div=document.createElement('div');
        div.className='order-item';
        div.innerHTML=`
        <p><strong>${o.name}</strong></p>
        <p>₦${o.total}</p>
        <p>${o.items.length} items</p>
        `;
        list.appendChild(div);
    });

    totalOrders.textContent=orders.length;
    revenue.textContent='₦'+total;
    usersCount.textContent=users.length;
}

function clearOrders(){
    localStorage.removeItem('orders');
    load();
}

load();
</script>

</body>
<script src="app.js"></script>
</html>
